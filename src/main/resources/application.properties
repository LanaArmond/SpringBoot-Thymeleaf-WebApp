spring.application.name=SpringBoot-Thymeleaf-WebApp

#MYSQL
spring.datasource.url= jdbc:mysql://localhost:3306/SB_TL_WEBAPP?createDatabaseIfNotExist=true
spring.datasource.username= root
spring.datasource.password= root

#JPA
spring.jpa.hibernate.ddl-auto= update
spring.jpa.show-sql= true
spring.jpa.open-in-view= true

#THYMELEAF
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

#SPRING SECURITY
spring.security.user.name=admin
spring.security.user.password=123456

spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
spring.web.error.include-stacktrace=always
