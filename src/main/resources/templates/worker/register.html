<!DOCTYPE html>
<html layout:decorate="~{layout}" lang="pt" xmlns:layout="http://www.w3.org/1999/xhtml">
<head> <meta charset="UTF-8"/> </head>
<body>
	
	<section class="layout-content" layout:fragment="body">
		<div class="page-header">
			<nav class="navbar navbar-expand-md navbar-top bg-light">
				<div class="collapse navbar-collapse" id="navbarsExampleDefault">
					<ul class="navbar-nav">
						<li class="nav-item active">
							<i class="oi oi-caret-right"></i>
							<span>Cadastrar Funcionários</span>
						</li>
					</ul>
				</div>
				<a class="btn btn-primary btn-md" href="/workers/list" role="button">
					<span class="oi oi-spreadsheet" title="Cadastro" aria-hidden="true"></span>
					<span>Listar Funcionários</span>
				</a>
			</nav>
		</div>

		<div class="container" id="register">
			<form action="/workers/save" method="POST">
				<div class="form-row">
					<div class="form-group col-md-6">
						<label for="name">Nome do Funcionário</label>
						<input type="text" class="form-control" id="name" placeholder="Nome Completo"
							   autofocus="autofocus" name="nome" value=""/>
						<div class="invalid-feedback">

						</div>
					</div>
					<div class="form-group col-md-6">
						<label for="salary">Salário Bruto</label>
						<input type="text" class="form-control" id="salary" data-mask="#.##0,00"
							   data-mask-reverse="true" name="salary" value=""/>
						<div class="invalid-feedback">

						</div>
					</div>
				</div>
				<div class="form-row">
					<div class="form-group col-md-6">
						<label for="entryDate">Data de Entrada</label>
						<input type="date" class="form-control" id="entryDate" name="entryDate" value=""/>
						<div class="invalid-feedback">

						</div>
					</div>
					<div class="form-group col-md-6">
						<label for="exitDate">Data de Saída</label>
						<input type="date" class="form-control" id="exitDate" name="exitDate" value=""/>
						<div class="invalid-feedback">

						</div>
					</div>
				</div>
				<div class="form-row">
					<div class="form-group col-md-6">
						<label for="role">Cargo</label>
						<select id="role" class="form-control" name="role">
							<option value="">Selecione...</option>
							<option value="1">Auxiliar Contábil</option>
							<option value="2">Auxiliar Administrativo</option>
							<option value="3">Contador</option>
							<option value="4">Adminitrador</option>
							<option value="5">Programado PHP</option>
							<option value="6">Desenvolvedor Java Jr.</option>
							<option value="7">Desenvolvedor Java Pleno</option>
							<option value="8">Desenvolvedor Java Senior</option>
							<option value="9">Auxiliar de RH</option>
							<option value="10">Coordenador de RH</option>
							<option value="11">Psicologo</option>
						</select>
						<div class="invalid-feedback">

						</div>
					</div>
				</div>
				<div class="form-row">
					<div class="form-group col-md-6">
						<label for="city">Cidade</label>
						<input type="text" class="form-control" id="city" name="address.city" value=""/>
						<div class="invalid-feedback">

						</div>
					</div>
					<div class="form-group col-md-6">
						<label for="street">Logradouro</label>
						<input type="text" class="form-control" id="street" placeholder="Rua sem número"
							   name="address.street" value=""/>
						<div class="invalid-feedback">

						</div>
					</div>
				</div>
				<div class="form-row">
					<div class="form-group col-md-6">
						<label for="number">Número</label>
						<input type="text" class="form-control" id="number" name="address.number" value=""/>
						<div class="invalid-feedback">

						</div>
					</div>
					<div class="form-group col-md-6">
						<label for="complement">Complemento</label>
						<input type="text" class="form-control" id="complement" placeholder="fundos, casa, AP. 102, .."
							   name="address.complement" value=""/>
						<div class="invalid-feedback">

						</div>
					</div>
				</div>
				<div class="form-row">
					<div class="form-group col-md-6">
						<label for="neighborhood">Bairro</label>
						<input type="text" class="form-control" id="neighborhood" name="address.neighborhood" value=""/>
						<div class="invalid-feedback">

						</div>
					</div>
					<div class="form-group col-md-4">
						<label for="state">UF</label>
						<select id="state" class="form-control" name="address.state">
							<option value="">Selecione...</option>
							<option value="AC">AC</option>
							<option value="AL">AL</option>
							<option value="AM">AM</option>
							<option value="BA">BA</option>
							<option value="CE">CE</option>
							<option value="DF">DF</option>
							<option value="ES">ES</option>
							<option value="GO">GO</option>
							<option value="MA">MA</option>
							<option value="MT">MT</option>
							<option value="MS">MS</option>
							<option value="MG">MG</option>
							<option value="PA">PA</option>
							<option value="PB">PB</option>
							<option value="PR">PR</option>
							<option value="PE">PE</option>
							<option value="PI">PI</option>
							<option value="RJ">RJ</option>
							<option value="RN">RN</option>
							<option value="RS">RS</option>
							<option value="RO">RO</option>
							<option value="RR">RR</option>
							<option value="SC">SC</option>
							<option value="SP">SP</option>
							<option value="SE">SE</option>
							<option value="TO">TO</option>
						</select>
						<div class="invalid-feedback">

						</div>
					</div>
					<div class="form-group col-md-2">
						<label for="cep">Cep</label>
						<input type="text" class="form-control" id="cep" data-mask="00000-000" name="address.cep"
							   value=""/>
						<div class="invalid-feedback">

						</div>
					</div>
				</div>
				<input type="hidden" id="id" name="id" value=""/>
				<button type="submit" class="btn btn-primary btn-sm">Salvar</button>
			</form>
		</div>
	</section>

</body>
</html>
