<!DOCTYPE html>
<html layout:decorate="~{layout}" lang="pt" xmlns:layout="http://www.w3.org/1999/xhtml">
<head> <meta charset="UTF-8"/> </head>
<body>
	
	<section class="layout-content" layout:fragment="body">

		<nav class="navbar navbar-expand-md bg-light">
			<div class="collapse navbar-collapse" id="navbarsExampleDefault">
				<ul class="navbar-nav mr-auto">
					<li class="nav-item active">
						<i class="oi oi-caret-right"></i>

				</ul>
				<a class="btn btn-primary btn-md" href="/departments/register" role="button">

				</a>
			</div>

		<div class="container" id="listing">

						<td>3</td>

							<a class="btn btn-info btn-sm" href="/departments/edit/3" role="button">
								<span class="oi oi-brush" title="Editar" aria-hidden="true"></span>
							</a>
							<button id="btn_departments/delete/3" type="button" class="btn btn-danger btn-sm">
								<span class="oi oi-circle-x" title="Exclusão desabilitada" aria-hidden="true"></span>

						</td>
					</tr>
					<tr>
						<td>2</td>
						<td>Contabilidade</td>

							</a>
							<button type="button" class="btn btn-danger btn-sm">
								<span class="oi oi-circle-x" title="Exclusão desabilitada" aria-hidden="true"></span>

							</button>

					</tr>

				</table>
